<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus AI Mentor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(270deg, #0d0d0d, #1a0033, #003322, #0d0d0d);
  background-size: 600% 600%;
  animation: bgmove 12s infinite;
  color: white;
}

@keyframes bgmove {
  0%   { background-position: 0% 50% }
  50%  { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

.container {
  width: 60vw;
  height: 80vh;
  backdrop-filter: blur(18px);
  background: rgba(255, 255, 255, 0.04);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px rgba(0, 255, 150, 0.15), 0 0 0 1px rgba(0,255,150,0.08);
  border: 1px solid rgba(0, 255, 150, 0.12);
}

.ai-orb {
  width: 120px;
  height: 120px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  box-shadow: none;
  overflow: hidden;
  padding: 0px;
}

.ai-orb img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(0,255,150,0.4));
  animation: logopulse 3s ease-in-out infinite;
}

@keyframes logopulse {
  0%,100% { filter: drop-shadow(0 0 6px rgba(0,255,150,0.4)); }
  50%      { filter: drop-shadow(0 0 14px rgba(0,255,150,0.8)); }
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 30px rgba(0,255,150,0.15), 0 0 60px rgba(0,255,150,0.08); }
  50%      { box-shadow: 0 0 50px rgba(0,255,150,0.35), 0 0 100px rgba(0,255,150,0.15); }
}

.title {
  text-align: center;
  font-size: 22px;
  margin: 8px 0 10px;
  color: #00ff96;
  text-shadow: 0 0 20px rgba(0,255,150,0.5);
  letter-spacing: 1px;
}

.quick {
  text-align: center;
  margin-bottom: 8px;
}

.quick button {
  background: rgba(0, 255, 150, 0.07);
  border: 1px solid rgba(0, 255, 150, 0.25);
  color: #00ff96;
  border-radius: 20px;
  padding: 6px 14px;
  margin: 3px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 13px;
}

.quick button:hover { 
  background: #00ff96;
  color: #0d0d0d;
  box-shadow: 0 0 16px #00ff96;
}

.chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.chatbox::-webkit-scrollbar { width: 4px; }
.chatbox::-webkit-scrollbar-thumb { background: rgba(0,255,150,0.2); border-radius: 4px; }

.message {
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 70%;
  font-size: 14px;
  animation: fadein 0.3s ease;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #00ff96, #00c896);
  color: #0d0d0d;
  font-weight: 600;
}

.bot {
  align-self: flex-start;
  background: rgba(0, 255, 150, 0.06);
  border: 1px solid rgba(0, 255, 150, 0.15);
  color: #d0ffe8;
}

.typing {
  display: flex;
  gap: 5px;
  padding: 8px;
}

.typing span {
  width: 8px;
  height: 8px;
  background: #00ff96;
  border-radius: 50%;
  animation: blink 1.4s infinite;
  box-shadow: 0 0 6px #00ff96;
}

.typing span:nth-child(2) { animation-delay: 0.2s }
.typing span:nth-child(3) { animation-delay: 0.4s }

@keyframes blink {
  0%, 80%, 100% { opacity: 0 }
  40%           { opacity: 1 }
}

.input-area {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(0, 255, 150, 0.2);
  background: rgba(0, 255, 150, 0.04);
  color: white;
  outline: none;
  font-size: 14px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

input:focus {
  border-color: rgba(0, 255, 150, 0.5);
  box-shadow: 0 0 0 3px rgba(0, 255, 150, 0.08);
}

input::placeholder { color: rgba(0,255,150,0.35); }

.icon {
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.send {
  background: linear-gradient(135deg, #00ff96, #00c896);
  color: #0d0d0d;
}

.send:hover {
  box-shadow: 0 0 20px #00ff96;
  transform: scale(1.08);
}

.mic {
  background: rgba(255, 80, 80, 0.15);
  color: #ff5050;
  border: 1px solid rgba(255,80,80,0.3);
}

.mic:hover {
  background: #ff5050;
  color: white;
  box-shadow: 0 0 18px rgba(255,80,80,0.6);
}

/* ── Splash Screen ── */
#splash {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: linear-gradient(270deg, #0d0d0d, #1a0033, #003322, #0d0d0d);
  background-size: 600% 600%;
  animation: bgmove 12s infinite;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}

#splash.hide {
  opacity: 0;
  visibility: hidden;
}

#splash .splash-logo {
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: splashpulse 1.5s ease-in-out infinite;
}

#splash .splash-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 18px rgba(0,255,150,0.6));
}

#splash .splash-title {
  font-size: 32px;
  font-weight: 700;
  color: #00ff96;
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(0,255,150,0.7);
  animation: fadein 0.8s ease;
}

#splash .splash-sub {
  font-size: 14px;
  color: rgba(0,255,150,0.5);
  letter-spacing: 2px;
  animation: fadein 1.2s ease;
}

#splash .splash-dots {
  display: flex;
  gap: 8px;
}

#splash .splash-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00ff96;
  animation: dotbounce 1s ease-in-out infinite;
}

#splash .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
#splash .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes splashpulse {
  0%,100% { filter: drop-shadow(0 0 10px rgba(0,255,150,0.4)); transform: scale(1); }
  50%      { filter: drop-shadow(0 0 30px rgba(0,255,150,0.9)); transform: scale(1.05); }
}

@keyframes dotbounce {
  0%,100% { transform: translateY(0); opacity: 0.4; }
  50%      { transform: translateY(-10px); opacity: 1; }
}

</style>
</head>
<body>
<div id="splash">
  <div class="splash-logo">
    <img src="SCE_LOGO-removebg-preview (1).png" alt="Logo"/>
  </div>
  <div class="splash-title">Sasurie Mentor AI</div>
  <div class="splash-sub">Your Smart Campus Assistant</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>


<div class="container">

  <div style="display:flex;flex-direction:column;align-items:center;"><div class="ai-orb"><img src="SCE_LOGO-removebg-preview (1).png" alt="Logo"/></div>

  <div class="title">Sasurie Mentor AI</div></div>

  <div class="quick">
    <button onclick="quickAsk('exam')">Exam</button>
    <button onclick="quickAsk('library')">Library</button>
    <button onclick="quickAsk('hostel')">Hostel</button>
    <button onclick="quickAsk('auditorium')">Auditorium</button>
    <button onclick="quickAsk('transport')">Transport</button>
    <button onclick="quickAsk('map')">Campus Map</button>
  </div>

  <div class="chatbox" id="chatbox">
    <div class="message bot">👋 Hello! Ask me anything about the campus.</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Ask about campus..." />
    <button class="icon send" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
    <button class="icon mic" onclick="startVoice()">
      <i class="fas fa-microphone"></i>
    </button>
  </div>

</div>

<script>
  

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});

function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

function sendMessage() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (text === "") return;

  let chat = document.getElementById("chatbox");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  chat.innerHTML += `
    <div class="message bot typing" id="typing">
      <span></span><span></span><span></span>
    </div>`;
  chat.scrollTop = chat.scrollHeight;

  let reply = getResponse(text);

  setTimeout(() => {
    document.getElementById("typing").remove();
    chat.innerHTML += `<div class="message bot">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
    speak(reply);
  }, 1200);

  input.value = "";
}

function quickAsk(q) {
  document.getElementById("input").value = q;
  sendMessage();
}

function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";
  recognition.start();
  recognition.onresult = function(e) {
    let text = e.results[0][0].transcript;
    document.getElementById("input").value = text;
    sendMessage();
  }
}

function getResponse(q) {
  q = q.toLowerCase();
  /* Exams */

if(q.includes("exam")){
return "📅 Internal exams usually start at the end of the month. Check the notice board for exact schedule.";
}

if(q.includes("hello") || q.includes("hi")){
return "👋 Yes, what can I do for you.";
}

/* Courses */

else if(q.includes("course")){
return "🎓 Courses available: CSE, CSE CS, ECE, Mechanical, Civil, EEE and IT.";
}

/* Hostel */

else if(q.includes("hostel")){
return "🏠 Hostel facilities are available for both boys and girls seperatedly inside the campus.";
}

/* Placement */

else if(q.includes("placement")){
return "💼 Top companies visit our campus for placements every year.";
}

/* Facilities */

else if(q.includes("facility") || q.includes("facilities")){
return "🏫 Campus facilities includes Library, Computer Labs, Free WiFi campus, Sports ground, Hostel, Cafeteria and Transport services.";
}

/* Library */

else if(q.includes("library")){
return "📚 Library is located on the 1st floor of the Fashion Designing block. Timing: 8 AM – 8 PM.";
}

/* Boys Restroom */

else if(q.includes("boys restroom") || q.includes("boys washroom") || q.includes("boys toilet")){
return "🚹 Boys restroom  → FIrst & Fourth Floor  → Right corner.";
}

/* Girls Restroom */

else if(q.includes("girls restroom") || q.includes("girls washroom")){
return "🚺 Girls restroom → Ground & Third Floor → Right corner.";
}

/* Auditorium */

else if(q.includes("auditorium")){
return "🎤 Auditorium → Manolaya Block → Third Floor  → Left corner.";
}

/* 3rd CSE */

else if(q.includes("3rd cse") || q.includes("cse 3rd") || q.includes("third cse")){
return "💻 3rd Year CSE classroom → Manolaya Block → Third Floor.";
}

/* Labs */

else if(q.includes("lab")){
return "🧪 Computer labs → Manolaya Block → First & Second Floors → Left of the Block .";
}

/* Transport */

else if(q.includes("transport office") || q.includes("transport") ){
return "🚌 Transport Office is located in Fashion Desinging Block → Ground Floor → Right Side. College buses operated for nearby cities, towns and villages."
}

/* BE Department */

else if(q.includes("be department") || q.includes("be dept")){
return "🖥️ CSE Department is located in Engineering Block → First Floor → Right Side.";
}

/* B TECH Department */

else if(q.includes("b tech department") || q.includes("btech department") || q.includes("b tech dept")){
return "💻 B TECH Department is located in Engineering Block → Second Floor → Right Side.";
}

/* Principal Room */

else if(q.includes("principal") || q.includes("pricipal room") || q.includes("principal office")){
return "🤵🏻‍♂️ Pricipal Office is located in Manolaya Block → Ground Floor → Right Side.";
}

/* Chairman Room */

else if(q.includes("chairman") || q.includes("chairman room") || q.includes("chairman office")){
return "🤵🏼 Chairman Office is located in Manolaya Block → Ground Floor → Left Side.";
}

/* Accounts Room */

else if(q.includes("accounts") || q.includes("accounts room") || q.includes("accounts office")){
return "💸 Accounts Office is located in Manolaya Block → Ground Floor → Left Side.";
}

/* Admission Room */

else if(q.includes("accounts") || q.includes("accounts room") || q.includes("accounts office")){
return "🎟️ Admission Office is located in Manolaya Block → Ground Floor → Left Side.";
}

/*  Transport Route */

else if(q.includes("old bud stand") || q.includes("uthukuli") || q.includes("palladam")){
return "🚌 The bus no: 121 is operted for your destination.";
}

else if(q.includes("vijayamangalam") || q.includes("thindal") || q.includes("erode")){
return "🚌 The bus no: 123 is operted for your destination.";
}

else if(q.includes("chennimalai") || q.includes("sivan malai") || q.includes("vella kovil")){
return "🚌 The bus no: 122 is operted for your destination.";
}

else if(q.includes("gopi chettipalayam") || q.includes("gopi") || q.includes("sathiyamangalam")){
return "🚌 The bus no: 110 is operted for your destination.";
}

else if(q.includes("goundapalayam") || q.includes("koolipalayam") || q.includes("")){
return "🚌 The bus no: 108 is operted for your destination.";
}

/*  Drinking Water */

else if(q.includes("water") || q.includes("drinking water")){
return "🚰 Drinking water is available in Ground & First floor.";
}

/*  Canteen */

else if(q.includes("canteen") || q.includes("cafeteria") || q.includes("snacks")){
return "☕ Canteen is located infront of college main gate. 📌 https://maps.app.goo.gl/C9PLUDfaTEsCLo4w8?g_st=aw";
}

/*  Mess */

else if(q.includes("mess") || q.includes("food")){
return "🍲 Mess is located backside of Manolaya Block.";
}

/* Map Help */

else if(q.includes("map")){

return window.open("https://maps.app.goo.gl/96wqG43eJCLcevhf7?g_st=aw");
}

/* Default */

else{
return "ℹ️ If any issues in getting information contact: 📞 10101 01010.";
}
}

  // Splash screen auto-dismiss
  setTimeout(function() {
    document.getElementById('splash').classList.add('hide');
  }, 2500);

</script>
</body>
</html>
